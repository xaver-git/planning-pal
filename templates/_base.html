<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PlanningPal{% endblock %}</title>

  <!-- Tailwind Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            background:              '#FAFAF7',
            foreground:              '#1a1f3a',
            card:                    '#ffffff',
            'card-foreground':       '#1a1f3a',
            primary:                 '#0f1e3d',
            'primary-foreground':    '#FAFAF7',
            secondary:               '#EEF0F5',
            'secondary-foreground':  '#0f1e3d',
            muted:                   '#EEF0F5',
            'muted-foreground':      '#6b7194',
            border:                  '#E2E4ED',
            success:                 '#2D7A5F',
            'success-foreground':    '#FAFAFA',
            'success-soft':          '#DFF0EB',
            warning:                 '#D97706',
            'warning-foreground':    '#FAFAFA',
            'warning-soft':          '#FEF3C7',
            danger:                  '#B91C1C',
            'danger-foreground':     '#FAFAFA',
            'danger-soft':           '#FEE2E2',
            sidebar:                 '#0f1e3d',
            'sidebar-foreground':    '#E5E7EF',
            'sidebar-border':        '#1e2e55',
            'sidebar-primary':       '#FCFCFC',
            'sidebar-primary-foreground': '#0f1e3d',
            'sidebar-accent':        '#1e3060',
            'sidebar-accent-foreground': '#FCFCFC',
          },
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
          },
        }
      }
    };
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Custom styles -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

  {% block head %}{% endblock %}
</head>
<body class="bg-background text-foreground font-sans antialiased min-h-screen">
  {% block body %}{% endblock %}

  <!-- Lucide icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
